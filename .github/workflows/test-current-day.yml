name: Test, Build, and Release Current Day App

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate day/date functions
        run: |
          python -c "import current_day; print(current_day.get_current_day()); print(current_day.get_current_date())"

  build-and-release:
    runs-on: windows-latest
    needs: test
    env:
      TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'unset' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependency
        run: python -m pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --onefile --noconsole --name "current-day-app-$env:TAG_NAME" current_day.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-day-app-windows-${{ env.TAG_NAME }}
          path: dist/current-day-app-${{ env.TAG_NAME }}.exe

      - name: Upload executable to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/current-day-app-${{ env.TAG_NAME }}.exe
